{% extends 'portfolio/base.html' %}
 
{% block content %}
 
<div class="page-header">
    <div>
        <h1>{% if member %}Editar Membro{% else %}Novo Membro{% endif %}</h1>
        <p class="subtitle">{% if member %}atualize os dados do membro{% else %}adicione um novo membro à holding{% endif %}</p>
    </div>
</div>
 
<div class="card" style="max-width: 480px;">
    <form method="POST">
        {% csrf_token %}
 
        <div class="form-group">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" value="{{ member.name }}" placeholder="ex: Murilo" required>
        </div>
 
        <div class="form-group">
            <label for="relationship">Parentesco</label>
            <input type="text" id="relationship" name="relationship" value="{{ member.relationship }}" placeholder="ex: Pai, Mãe, Filho" required>
        </div>
 
        <div class="actions" style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-save">Salvar</button>
            <a href="{% url 'dashboard' %}" class="btn btn-cancel">Cancelar</a>
        </div>
    </form>
</div>
 
{% endblock %}
