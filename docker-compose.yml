version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: holding_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suasenha123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: